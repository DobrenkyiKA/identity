spring:
  application:
    name: user
  devtools:
    restart:
      enabled: false
  config:
    import: optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:${CONFIG_SERVER_PORT:8888}
  cloud:
    config:
      fail-fast: false
      retry:
        max-attempts: 5
        initial-interval: 1500
        max-interval: 5000
        multiplier: 1.5